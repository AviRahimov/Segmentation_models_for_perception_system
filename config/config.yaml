# Off-Road Robotics Perception — main configuration

models:
  # To revert to Round 1 yolo11m:
  #   name: "yolo11m"  weights: "weights/detection/yolo11m/round1/best.pt"
  #   prompt_mode: production  imgsz: 640
  #   person.coco_classes: [2]  vehicle.coco_classes: [1]
  instance:
    enabled: true
    name: "yolo11m"
    weights: "weights/detection/yolo11m/exp/freeze10_aug_clean/best.pt"
    prompt_mode: production             # production | discovery
    discovery_vocabulary_path: "yoloe_discovery_vocab.example.txt"
    discovery_conf_floor: 0.05
    imgsz: 640

  # Other options: segformer-b0 (fastest), segformer-b1, segformer-b4
  semantic:
    name: "segformer-b2"
    weights: "weights/orfd/frozen_backbone/segformer-b2/best.pth"
    num_classes: 3
    processor_size: 256

# ---------------------------------------------------------------------------
classes:

  # coco_classes are 1-indexed (wrapper subtracts 1): model classes are
  # 0='Military Vehicle', 1='person' → config values [1]=vehicle, [2]=person
  - name: "person"
    text_prompt: "person"
    coco_classes: [2]
    display_mode: "both"
    color: "#00ff80"
    is_semantic: false
    confidence_threshold: 0.80

  - name: "vehicle"
    text_prompt: >-
      cargo truck, car barrier, military supply truck, military convoy vehicle, armored personnel carrier,
      military transport vehicle, delivery truck
    coco_classes: [1]
    display_mode: "both"
    color: "#ffc800"
    is_semantic: false
    confidence_threshold: 0.94

  - name: "obstacle"
    text_prompt: >-
      rock, log, debris, boulder, large rock, fallen tree, tree stump,
      deep rut, ditch, berm, earthwork
    coco_classes: []
    display_mode: "bbox_only"
    color: "#ff4040"
    is_semantic: false

  - name: "unnecessary_detection"
    text_prompt: "RV. bridge-laying tank, motorhome, gazebo, truck, trash, container, barrier, traffic cone, traffic light, traffic sign, boom barrier, road block, street light, pole, mobile generator, box truck"
    coco_classes: []
    display_mode: "none"
    color: "#000000"
    is_semantic: false
    confidence_threshold: 0.05

  # Semantic classes — order must match model output: 0=non_traversable, 1=road_ground, 2=sky
  - name: "non_traversable"
    text_prompt: "obstacle or non-drivable area"
    display_mode: "none"
    color: "#404040"
    is_semantic: true

  - name: "road_ground"
    text_prompt: "road or drivable ground surface"
    display_mode: "mask_only"
    color: "#6464ff"
    is_semantic: true

  - name: "sky"
    text_prompt: "sky"
    display_mode: "none"
    color: "#c8c8c8"
    is_semantic: true

# ---------------------------------------------------------------------------
temporal:
  semantic_ema:
    alpha: 0.35
    reset_on_scene_cut: true
    scene_cut_threshold: 0.45

  instance_tracker:
    iou_threshold: 0.30
    max_hold_frames: 5
    hold_score_decay: 0.85
    bbox_alpha: 0.95
    score_alpha: 0.40

# ---------------------------------------------------------------------------
hardware:
  device: "cuda"
  fp16: true
  use_tensorrt: false
  trt_workspace_gb: 4

player:
  mask_alpha: 0.45
  show_fps: true
  show_class_legend: true
  default_speed: 1.0
  draw_road_ground_semantic_last: true

# ---------------------------------------------------------------------------
source:
  type: "video"                   # video | camera | image_dir
  path: "samples/desert_video.mp4"
  camera_index: 0
  image_dir_glob: "*.png"
  fps_hint: 30.0

# ---------------------------------------------------------------------------
# Used only by scripts/segmentation/evaluation/orfd_semantic_comparison.py
orfd_semantic_comparison:
  orfd_trav_gray: 255
  freespace_merged_prob_floor: 0.25
  instance_mask_subtraction:
    subtract_from_traversable: true
    dilate_px: 5
