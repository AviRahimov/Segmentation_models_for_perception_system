# Off-Road Robotics Perception — main configuration

models:
  # Model + profile must match: 2-class checkpoints -> profile 2class,
  # merged_6class checkpoints -> profile 6class, YOLOE -> profile yoloe.
  # Previous production pair: profile 2class +
  #   weights: "weights/detection/yolo11m/exp/freeze10_aug_clean/best.pt"
  instance:
    enabled: true
    # name: "yolo26m"                     # <-- switch here: yolo11m | yolo26m
    name: "yolo11s"
    profile: 6class                     # <-- switch here: 2class | 6class | yoloe
    # weights: "weights/detection/yolo26m/merged_6class/noaug/best.pt"
    weights: "weights/detection/yolo11s/merged_6class/noaug/best.pt"
    prompt_mode: production             # production | discovery
    discovery_vocabulary_path: "yoloe_discovery_vocab.example.txt"
    discovery_conf_floor: 0.05
    # 1280 = upscale inference for low-res sources (kaggle-trained models are
    # near-blind on 640x360 video at imgsz 640: small-object domain gap)
    imgsz: 1280
    # An already-confirmed track may accept a sub-threshold detection to keep
    # following the object's real position, instead of freezing/fading via
    # hold. Never creates or (re)confirms a track on its own.
    low_conf_recovery:
      enabled: false
      recovery_conf_floor: 0.15   # below a class's own threshold, above this -> recovery-only

  # Other options: segformer-b0 (fastest), segformer-b1, segformer-b4
  semantic:
    name: "segformer-b2"
    weights: "weights/orfd/frozen_backbone/segformer-b2/best.pth"
    num_classes: 3
    processor_size: 256

# ===========================================================================
# INSTANCE PROFILES — one block per model family; switch via
# models.instance.profile above. coco_classes are 1-INDEXED (wrapper
# subtracts 1 before matching the model's 0-indexed outputs).
# ===========================================================================
instance_profiles:

  # ── 2class ── for checkpoints trained on the 2-class scheme
  #    (Detection_Dataset, merged_2class, kaggle_2class, auto-labeled)
  #    model classes: 0='Military Vehicle', 1='person'
  2class:
    - name: "mil vehicle"
      text_prompt: "military vehicle"
      coco_classes: [1]
      display_mode: "both"
      color: "#ffc800"
      is_semantic: false
      confidence_threshold: 0.50
    - name: "person"
      text_prompt: "person"
      coco_classes: [2]
      display_mode: "both"
      color: "#00ff80"
      is_semantic: false
      confidence_threshold: 0.20      # best-F1 for yolo11m/exp/freeze10_aug_clean

  # ── 6class ── for merged_6class checkpoints; every object type has its own
  #    threshold + color. model classes: 0=tank 1=truck 2=armored_vehicle
  #    3=civilian_vehicle 4=soldier 5=civilian
  #    (to group into vehicle/person instead: two classes with
  #     coco_classes [1,2,3] and [5,6])
  6class:
    - name: "tank"
      text_prompt: "tank"
      coco_classes: [1]
      display_mode: "both"
      color: "#ffc800"
      is_semantic: false
      confidence_threshold: 0.50
    - name: "truck"
      text_prompt: "military truck"
      coco_classes: [2]
      display_mode: "none"
      color: "#ff7800"
      is_semantic: false
      confidence_threshold: 0.50
    - name: "armored_vehicle"
      text_prompt: "armored vehicle"
      coco_classes: [3]
      display_mode: "both"
      color: "#ffe000"
      is_semantic: false
      confidence_threshold: 0.45
    - name: "civilian_vehicle"       # FP sink: detected, never displayed
      text_prompt: "civilian car"
      coco_classes: [4]
      display_mode: "none"
      color: "#888888"
      is_semantic: false
      confidence_threshold: 0.30
    - name: "soldier"
      text_prompt: "soldier"
      coco_classes: [5]
      display_mode: "both"
      color: "#00ff80"
      is_semantic: false
      confidence_threshold: 0.30
    - name: "civilian"
      text_prompt: "civilian person"
      coco_classes: [6]
      display_mode: "both"
      color: "#00c8ff"
      is_semantic: false
      confidence_threshold: 0.30

  # ── yoloe ── open-vocabulary text prompts (kept pending the YOLOE verdict)
  yoloe:
    # - name: "vehicle"
    #   text_prompt: >-
    #     cargo truck, car barrier, military supply truck, military convoy vehicle,
    #     armored personnel carrier, military transport vehicle, delivery truck, mine-resistant vehicle, engineering vehicle
    #   coco_classes: []
    #   display_mode: "both"
    #   color: "#ffc800"
    #   is_semantic: false
    #   confidence_threshold: 0.30

    - name: "military vehicle"
      text_prompt: >-
        mine-resistant vehicle, engineering vehicle
      coco_classes: []
      display_mode: "both"
      color: "#ffc800"
      is_semantic: false
      confidence_threshold: 0.50

    # - name: "building"
    #   text_prompt: >-
    #     destroyed building, building, smoked building, black building, high-rise building
    #   coco_classes: []
    #   display_mode: "both"
    #   color: "#ff4040"
    #   is_semantic: false
    #   confidence_threshold: 0.50

    - name: "person"
      text_prompt: "person"
      coco_classes: []
      display_mode: "both"
      color: "#00ff80"
      is_semantic: false
      confidence_threshold: 0.50

    - name: "obstacle"
      text_prompt: >-
        rock, log, debris, boulder, large rock, fallen tree, tree stump,
        deep rut, ditch, berm, earthwork
      coco_classes: []
      display_mode: "bbox_only"
      color: "#ff4040"
      is_semantic: false
      
    - name: "unnecessary_detection"   # false-positive sink for display
      text_prompt: "portacabin, building, high-rise building, tower, destroyed building, RV, bridge-laying tank, motorhome, gazebo, truck, trash, container, barrier, traffic cone, traffic light, traffic sign, boom barrier, road block, street light, pole, mobile generator, box truck"
      coco_classes: []
      display_mode: "none"
      color: "#000000"
      is_semantic: false
      confidence_threshold: 0.10

# ---------------------------------------------------------------------------
# Semantic classes only (instance classes live in instance_profiles above).
# Order must match model output: 0=non_traversable, 1=road_ground, 2=sky
classes:

  - name: "non_traversable"
    text_prompt: "obstacle or non-drivable area"
    display_mode: "none"
    color: "#404040"
    is_semantic: true

  - name: "road_ground"
    text_prompt: "road or drivable ground surface"
    display_mode: "mask_only"
    color: "#6464ff"
    is_semantic: true

  - name: "sky"
    text_prompt: "sky"
    display_mode: "none"
    color: "#c8c8c8"
    is_semantic: true

# ---------------------------------------------------------------------------
temporal:
  semantic_ema:
    alpha: 0.35
    reset_on_scene_cut: true
    scene_cut_threshold: 0.45

  instance_tracker:
    enabled: true                 # false = bypass tracking entirely (raw per-frame detections, no smoothing)
    iou_threshold: 0.30
    max_hold_frames: 3
    hold_score_decay: 0.85
    bbox_alpha: 0.95
    score_alpha: 0.40
    # Optimal one-to-one assignment (scipy Hungarian) instead of greedy
    # best-IoU-first matching. Only changes behavior in genuine multi-overlap
    # ambiguity (rare with few objects/frame) — safe to enable.
    use_hungarian_matching: false
    # A new track must match for this many STRICTLY CONSECUTIVE frames before
    # it is ever displayed. 1 = no gating (today's behavior). 2-3 suppresses
    # one-off false-positive flicker at the cost of ~1-2 frames of latency
    # (~33-66ms @30fps) before a real object's box first appears.
    min_hits: 3

# ---------------------------------------------------------------------------
# Drop same-class duplicate detections (a box nested inside, or heavily
# overlapping, another box of the same class). Runs before the tracker.
postprocess:
  duplicate_filter:
    enabled: true
    iou_threshold: 0.55          # same-class overlap ratio -> duplicate
    containment_threshold: 0.85  # intersection/min-area -> nested duplicate
    score_margin: 0.05           # prefer the tighter box within this score gap

# ---------------------------------------------------------------------------
hardware:
  device: "cuda"
  fp16: true
  use_tensorrt: false
  trt_workspace_gb: 4

player:
  mask_alpha: 0.45
  show_fps: true
  show_class_legend: true
  default_speed: 1.0
  draw_road_ground_semantic_last: true

# ---------------------------------------------------------------------------
source:
  type: "video"                   # video | camera | image_dir
  path: "samples/desert_video.mp4"
  camera_index: 0
  image_dir_glob: "*.png"
  fps_hint: 30.0

# ---------------------------------------------------------------------------
# Used only by scripts/segmentation/evaluation/orfd_semantic_comparison.py
orfd_semantic_comparison:
  orfd_trav_gray: 255
  freespace_merged_prob_floor: 0.25
  instance_mask_subtraction:
    subtract_from_traversable: true
    dilate_px: 5
