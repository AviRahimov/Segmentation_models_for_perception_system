# Off-Road Robotics Perception — main configuration
#
# HOW TO SWITCH MODELS
# --------------------
# 1. In the `semantic:` section, comment/uncomment the block you want.
# 2. In the `classes:` section, comment/uncomment the matching semantic class block.
# 3. No other files need to change.

# ---------------------------------------------------------------------------
models:
  instance:
    name: "yoloe26l"
    weights: "weights/yoloe-26l-seg.engine"
    confidence_threshold: 0.35
    prompt_mode: production            # production | discovery
    discovery_vocabulary_path: "yoloe_discovery_vocab.example.txt"
    discovery_conf_floor: 0.05
    imgsz: 512                         # inference image size; 640 = default, 512 saves ~25% on YOLOE

  semantic:
    # ── OPTION A: Fine-tuned 3-class (ORFD) ────────────────────────────────
    # 3-class head trained on ORFD: non_traversable, traversable, sky.
    # Classes below: non_traversable + road_ground + sky (no ade20k_indices needed).
    name: "segformer-b2"
    weights: "weights/orfd/final_dataset/segformer-b2/best.pth"
    num_classes: 3
    processor_size: 256                # processor input size; 512 = default, 256 = ~2x faster, 384 = middle ground
    trt_engine_path: "weights/orfd/final_dataset/segformer-b2/best-256x256.engine"

    # ── OPTION B: SegFormer-B4 fine-tuned (ORFD) ───────────────────────────
    # name: "segformer-b4"
    # weights: "weights/orfd/segformer-b4/best.pth"
    # num_classes: 3

    # ── OPTION C: DDRNet fine-tuned (ORFD) ─────────────────────────────────
    # name: "ddrnet"
    # weights: "weights/orfd/ddrnet/best.pth"
    # num_classes: 3

    # ── OPTION D: SegFormer-B2 ADE20K pretrained (no fine-tuning) ──────────
    # Requires semantic classes below to have ade20k_indices.
    # name: "segformer-b2"
    # weights: ""

# ---------------------------------------------------------------------------
# Class definitions
#
# Instance classes (`is_semantic: false`): driven by YOLOE text prompts.
# Semantic classes (`is_semantic: true`): output of the semantic model.
#   Fine-tuned mode: no ade20k_indices — model outputs user classes directly.
#   ADE20K mode:     ade20k_indices required — maps native channels to user class.
# ---------------------------------------------------------------------------
classes:

  # ── Instance classes (YOLOE) — always active ────────────────────────────

  - name: "person"
    text_prompt: "person"
    display_mode: "both"
    color: "#00ff80"
    is_semantic: false
    confidence_threshold: 0.37

  - name: "vehicle"
    text_prompt: >-
      passenger car, driving car, SUV, pickup truck, van, minivan, jeep,
      off-road truck, ATV, UTV, motorcycle,
      motorbike, farm tractor, trailer
    display_mode: "both"
    color: "#ffc800"
    is_semantic: false
    confidence_threshold: 0.35

  - name: "obstacle"
    text_prompt: "rock, log, debris"
    display_mode: "bbox_only"
    color: "#ff4040"
    is_semantic: false

  - name: "unnecessary_detection"
    text_prompt: "truck, trash, container, barrier, traffic cone, traffic light, traffic sign, traffic block, boom barrier, road block, street light, pole"
    display_mode: "none"
    color: "#000000"
    is_semantic: false
    confidence_threshold: 0.05

  # ── Semantic classes — MUST match the semantic model option above ─────────

  # For OPTION A/B/C (fine-tuned 3-class, num_classes: 3):
  # Class order must match model output: 0 = non_traversable, 1 = road_ground, 2 = sky
  - name: "non_traversable"
    text_prompt: "obstacle or non-drivable area"
    display_mode: "none"
    color: "#404040"
    is_semantic: true

  - name: "road_ground"
    text_prompt: "road or drivable ground surface"
    display_mode: "mask_only"
    color: "#6464ff"
    is_semantic: true

  - name: "sky"
    text_prompt: "sky"
    display_mode: "none"      # predicted but not rendered — prevents sky-as-traversable artifact
    color: "#c8c8c8"
    is_semantic: true

  # For OPTION D (ADE20K pretrained), replace the two above with:
  # - name: "road_ground"
  #   display_mode: "mask_only"
  #   color: "#6464ff"
  #   is_semantic: true
  #   ade20k_indices: [52, 91]        # path (#52) + dirt-track (#91)
  #   native_indices:
  #     goose_12: [5]
  #
  # - name: "grass"
  #   display_mode: "none"
  #   color: "#00c850"
  #   is_semantic: true
  #   ade20k_indices: [9]
  #   native_indices:
  #     goose_12: [0]
  #
  # - name: "vegetation"
  #   display_mode: "none"
  #   is_semantic: true
  #   ade20k_indices: [4, 16]
  #   native_indices:
  #     goose_12: [0]
  #
  # - name: "sand_gravel"
  #   display_mode: "mask_only"
  #   color: "#c2b280"
  #   is_semantic: true
  #   ade20k_indices: [46]
  #   native_indices:
  #     goose_12: [1]
  #
  # - name: "sky"
  #   display_mode: "none"
  #   color: "#c8c8c8"
  #   is_semantic: true
  #   ade20k_indices: [2]
  #   native_indices:
  #     goose_12: [8]

# ---------------------------------------------------------------------------
temporal:
  semantic_ema:
    alpha: 0.35
    reset_on_scene_cut: true
    scene_cut_threshold: 0.45

  instance_tracker:
    iou_threshold: 0.30       # min IoU to match detection to previous track
    max_hold_frames: 5        # frames a missed track is re-emitted (0 = no hold)
    hold_score_decay: 0.85    # per-missed-frame score decay (0.85^2 ≈ 0.72)
    bbox_alpha: 0.95          # EMA weight for bbox smoothing (lower = smoother)
    score_alpha: 0.40         # EMA weight for confidence display

# ---------------------------------------------------------------------------
hardware:
  device: "cuda"
  fp16: true
  use_tensorrt: true
  text_embed_cache: true
  trt_workspace_gb: 4        # GB workspace for TRT engine build (export time only)

player:
  mask_alpha: 0.45
  show_fps: true
  show_class_legend: true
  default_speed: 1.0
  draw_road_ground_semantic_last: true

# ---------------------------------------------------------------------------
source:
  type: "video"                   # video | camera | image_dir
  path: "samples/desert_video.mp4"
  camera_index: 0
  image_dir_glob: "*.png"
  fps_hint: 30.0

datasets:
  download_dir: "./datasets"

# ---------------------------------------------------------------------------
# ORFD / GOOSE freespace strip comparison
# Consumed only by scripts/orfd_semantic_comparison.py
# ---------------------------------------------------------------------------
orfd_semantic_comparison:
  orfd_trav_gray: 255
  freespace_merged_prob_floor: 0.25
  goose:
    ex_root: "datasets/goose/gooseEx_2d_val/gooseEx_2d_val"
    label_csv: "datasets/goose/gooseEx_2d_val/gooseEx_2d_val/goose_label_mapping.csv"
    scenario_dir: "spot_scenario03"
    samples: 5
    traversable_categories: [terrain, road]
  instance_mask_subtraction:
    subtract_from_traversable: true
    dilate_px: 5
