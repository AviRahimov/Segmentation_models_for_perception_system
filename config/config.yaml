# Off-Road Robotics Perception - default configuration.
#
# Adding a new class is a single YAML edit (see the "How to add a class"
# section in README.md). Nothing meaningful is hardcoded in source.

models:
  instance:
    name: "yoloe26l"
    weights: "yoloe-26l-seg.pt"          # Ultralytics YOLOE-26L seg checkpoint
    confidence_threshold: 0.35
  semantic:
    name: "segformer-b2"
    weights: "nvidia/segformer-b2-finetuned-ade-512-512"

# ---------------------------------------------------------------------------
# Class definitions. Two kinds of classes:
#   * Instance (`is_semantic: false`): driven by YOLOE text prompts.
#   * Semantic (`is_semantic: true` ): closed-vocab on ADE20K. The
#     `ade20k_indices` field tells the SegFormer wrapper which native ADE20K
#     channels to merge into this user class. See the full ADE20K class
#     list at: https://github.com/CSAILVision/sceneparsing
#
# Optional per-class fields (instance classes only):
#   * `confidence_threshold`: overrides `models.instance.confidence_threshold`
#     for THIS class only. Lower it for a class the model misses (e.g. small
#     or partially occluded cars); raise it for a class with frequent false
#     positives. Range [0, 1]. Omit to inherit the global value.
# ---------------------------------------------------------------------------
classes:
  # ----- Instance classes (YOLOE) ----------------------------------------
  - name: "person"
    # Natural phrases (no hyphen compounds): improves recall vs awkward tokens.
    # Tune ``confidence_threshold`` down if people are still missed; up if you get spurious humans.
    text_prompt: >-
      person, pedestrian, human, people, adult, child, man, woman,
      full body, standing person, walking person,
      person in the distance, human figure outdoor
    display_mode: "both"
    color: "#00ff80"
    is_semantic: false
    confidence_threshold: 0.15

  - name: "vehicle"
    # Tight motor-vehicle wording (not generic ``vehicle``) trims false positives;
    # raise ``confidence_threshold`` further if yellow boxes still latch onto non-cars.
    text_prompt: >-
      passenger car, driving car, SUV, pickup truck, van, minivan, jeep,
      off-road truck, ATV, UTV, motorcycle,
      motorbike, farm tractor, trailer
    display_mode: "both"
    color: "#ffc800"
    is_semantic: false
    confidence_threshold: 0.35  

  - name: "obstacle"
    text_prompt: "rock, log, debris"
    display_mode: "bbox_only"
    color: "#ff4040"
    is_semantic: false

  # ----- Semantic classes (SegFormer / ADE20K merged) --------------------
  # ADE20K channel cheat-sheet used below:
  #   road=6, sidewalk=11, earth=13, grass=9, plant=16, sand=46,
  #   field=29 (note: ADE20K's "field" lumps cultivated + grassy expanses),
  #   path=52, runway=53, dirt-track=91, land=94, hill=68, tree=4,
  #   water=21, sky=2
  #
  # Mapping rationale (off-road biased):
  #   * road_ground uses path + dirt-track only (#52, #91). We intentionally
  #     EXCLUDE ADE20K ``earth`` (#13): it labels most bare soil and causes
  #     SegFormer to paint entire fields purple (merged road_ground wins argmax).
  #     Omit ``sidewalk`` (#11) for the same generic-ground bleed in off-road
  #     video. Add #6 ``road`` if you need paved-lane recall.
  #   * sand_gravel keeps #46 (sand) only; #91 lives in road_ground.
  #   * vegetation (tree + plant) competes with road_ground on forest frames;
  #     keeps argmax from painting whole canopies as path/dirt-track.
  #   * grass (#9): use ``display_mode: none`` below so Qt player shows only path
  #     + sand; argmax unchanged (set ``mask_only`` to show grass again).
  #   * sky is included as a semantic class with display_mode "none" so
  #     sky pixels are absorbed (and rendered transparent) instead of
  #     leaking into terrain classes via argmax.
  #   Adjust the lists below for your domain, e.g. paved-road robotics
  #   would drop #91 from road_ground.
  - name: "road_ground"
    text_prompt: "road or drivable ground surface"
    display_mode: "mask_only"
    color: "#6464ff"
    is_semantic: true
    ade20k_indices: [52, 91]              # path, dirt-track — no earth/sidewalk
    native_indices:
      goose_12: [5]

  - name: "grass"
    text_prompt: "grass"
    display_mode: "none"                 # no overlay / legend — still in argmax
    color: "#00c850"
    is_semantic: true
    ade20k_indices: [9]                   # grass only
    native_indices:
      goose_12: [0]

  - name: "vegetation"
    text_prompt: "trees and tall vegetation"
    display_mode: "none"                 # inference only — keeps trees off player UI
    is_semantic: true
    ade20k_indices: [4, 16]             # tree, plant
    native_indices:
      goose_12: [0]

  - name: "sand_gravel"
    text_prompt: "sand or gravel surface"
    display_mode: "mask_only"
    color: "#c2b280"
    is_semantic: true
    ade20k_indices: [46]                  # sand only (dirt-track lives in road_ground)
    native_indices:
      goose_12: [1]

  - name: "sky"
    text_prompt: "sky"
    display_mode: "none"                  # absorbed but not drawn
    color: "#c8c8c8"
    is_semantic: true
    ade20k_indices: [2]                   # sky
    native_indices:
      goose_12: [8]

  # - name: "water"
  #   text_prompt: "water or wet surface"
  #   display_mode: "mask_only"
  #   color_rgb: [0, 120, 255]
  #   is_semantic: true
  #   ade20k_indices: [21]          # water

# ---------------------------------------------------------------------------
temporal:
  semantic_ema:
    alpha: 0.35
    reset_on_scene_cut: true
    scene_cut_threshold: 0.45     # Bhattacharyya distance, in [0, 1]

# ---------------------------------------------------------------------------
hardware:
  device: "cuda"
  fp16: true
  use_tensorrt: false             # see backends/tensorrt.py for integration
  text_embed_cache: true

player:
  mask_alpha: 0.45
  show_fps: true
  show_class_legend: true
  default_speed: 1.0
  # Blend road_ground semantic overlay after sand_gravel etc. so purple path stays on top.
  draw_road_ground_semantic_last: true

# ---------------------------------------------------------------------------
source:
  type: "video"                   # video | camera | image_dir
  path: "samples/recording.mp4"
  camera_index: 0
  image_dir_glob: "*.png"
  fps_hint: 30.0

datasets:
  download_dir: "./datasets"

# ---------------------------------------------------------------------------
# ORFD / GOOSE freespace strip comparison
# Consumed only by scripts/orfd_semantic_comparison.py — keeps that CLI small.
# ---------------------------------------------------------------------------
orfd_semantic_comparison:
  orfd_trav_gray: 255          # fillcolor traversable stripe (override 128 if mirrors differ)
  # Optional: traversable iff merged P(road_ground) >= this (omit or null → pure argmax).
  freespace_merged_prob_floor: 0.25
  goose:
    ex_root: "datasets/goose/gooseEx_2d_val/gooseEx_2d_val"
    label_csv: "datasets/goose/gooseEx_2d_val/gooseEx_2d_val/goose_label_mapping.csv"
    scenario_dir: "spot_scenario03"
    samples: 5                 # >0 adds random val frames from scenario_dir
    traversable_categories: [terrain, road]   # GOOSE-12 names; gravel is usually "terrain"
  instance_mask_subtraction:
    subtract_from_traversable: true
    dilate_px: 5
