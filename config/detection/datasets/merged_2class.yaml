# Merged 2-class training set — all web sources remapped to the pipeline scheme.
# Build: python scripts/detection/tools/build_dataset.py --manifest config/detection/datasets/merged_2class.yaml
name: merged_2class
output: datasets/merged_2class
classes: ["Military Vehicle", "person"]
min_box_px: 8            # drop annotation-noise boxes smaller than 8px
resplit:                 # applied to sources with target split 'pool'
  val_fraction: 0.05
  seed: 42

sources:
  # Manually labeled real data — oversampled so it can't be ignored (idea 2)
  - path: datasets/Detection_Dataset
    format: yolo_splits
    include_splits: {train: train, valid: val}   # test/ held out, never consumed
    oversample_train: 10
    map:
      Military Vehicle: Military Vehicle
      person: person

  # Kaggle 12-class original (mapped directly; supersedes military_kaggle_2class)
  - path: datasets/military_object_dataset_kaggle
    format: yolo_splits
    include_splits: {train: train, val: val}
    map:
      military_tank: Military Vehicle
      military_truck: Military Vehicle
      military_vehicle: Military Vehicle
      camouflage_soldier: person
      soldier: person
      civilian: person
    negatives:            # hard negatives: civilian cars + artillery images
      from_classes: [civilian_vehicle, military_artillery]
      fraction: 0.08

  # rstvv v2 (Roboflow) — broken 99/1 split → pooled and re-split
  - path: datasets/military-vehicle.v2i.yolo26
    format: yolo_splits
    include_splits: {train: pool, valid: pool, test: pool}
    map:                  # artillery (49 instances) dropped
      tank: Military Vehicle
      truck: Military Vehicle
      amoured-vehicle: Military Vehicle
      person: person

  # verrckter (class-per-directory layout; label ids meaningless)
  - path: datasets/verrckter_military_vehicle/ready_to_use_dataset/ready_to_use_dataset
    format: class_dirs
    alias: verrckter
    filename_exclude: [destr, aband]   # destroyed/abandoned vehicles filtered
    map:                  # ART, MRL dropped (artillery); no person class exists
      Tanks: Military Vehicle
      Trucks: Military Vehicle
      APC: Military Vehicle
      IFV: Military Vehicle
      IMV: Military Vehicle
      ENG: Military Vehicle
